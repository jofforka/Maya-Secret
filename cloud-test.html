<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cloud Test | Maya’s Secret</title><link rel="stylesheet" href="css/styles.css"></head><body><main class="section" style="max-width:850px;margin:auto"><p class="eyebrow">MAYA’S SECRET V4.1</p><h1>Cloud connection test</h1><p>This private diagnostic page checks whether the website can read the shared Google Drive catalogue.</p><div id="testStatus" class="cloud-status" data-state="loading" style="margin:2rem 0"><span></span><strong>Testing connection…</strong></div><pre id="testOutput" style="white-space:pre-wrap;background:#fff;padding:1.25rem;border-radius:16px;border:1px solid #ddd;overflow:auto"></pre><p><a class="btn primary" href="admin.html">Open Admin</a> <a class="btn ghost" href="shop.html">Open Shop</a></p></main><script src="js/cloud.js?v=7.0.0"></script><script>(async()=>{const status=document.getElementById('testStatus'),out=document.getElementById('testOutput');try{const products=await MayaCloud.getProducts();status.dataset.state='online';status.querySelector('strong').textContent='Connected to Google Drive';out.textContent=JSON.stringify({success:true,productCount:products.length,firstProducts:products.slice(0,5).map(p=>p.name)},null,2);}catch(e){status.dataset.state='offline';status.querySelector('strong').textContent='Connection failed';out.textContent=e.stack||e.message;}})();</script></body></html>
